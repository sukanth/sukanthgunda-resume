career-profile:
    title: Career Profile
    summary: |
      Senior Software Engineer with over a decade of experience designing, building,
      and operating large-scale distributed systems across cloud, enterprise, and
      healthcare technology. Currently at **Microsoft**, building **agentic AI
      developer tooling** — Copilot skills, orchestrator agents, and MCP (Model
      Context Protocol) servers — that help engineers across the company remediate
      security &amp; compliance violations and ship with confidence under the
      **Secure Future Initiative (SFI)**.

      Previously at **Oracle** and **Capgemini**, with a track record of shipping
      resilient services, improving developer productivity, and turning ambiguous
      problems into reliable products. Passionate about where **LLMs meet developer
      workflows** — prompt design, retrieval-augmented generation, and safe,
      auditable automation of real engineering work. I care deeply about clean
      architecture, pragmatic engineering, and raising the bar for the teams I work
      with through code reviews, design guidance, and mentoring early-career
      engineers in the Cerner Developer Center community.

