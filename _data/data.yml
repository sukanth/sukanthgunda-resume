career-profile:
    title: Career Profile
    summary: |
      Senior Software Engineer with over a decade of experience designing, building,
      and operating large-scale distributed systems across cloud, enterprise, and
      healthcare technology. Currently at **Microsoft**, previously at **Oracle**
      and **Capgemini**, with a track record of shipping resilient services,
      improving developer productivity, and partnering across disciplines to turn
      ambiguous problems into reliable products.

      Passionate about clean architecture, pragmatic engineering, and raising the
      bar for the teams I work with — whether that's through code reviews, design
      guidance, or mentoring the next generation of engineers through the Cerner
      Developer Center community.

education:
    title: Education
    info:
      - degree: M.S. in Computer Information Systems &amp; Information Technology
        university: University of Central Missouri
        time: 2016 - 2017
        details: |
          Graduate coursework focused on software engineering, distributed systems,
          database management, and applied data analytics. Emphasis on building
          production-grade software and translating theory into working systems.
      - degree: B.Tech in Computer Science &amp; Engineering
        university: V. R. Siddhartha Engineering College
        time: 2008 - 2012
        details: |
          Core computer science foundation — algorithms, operating systems, networks,
          databases, and software engineering — with hands-on project work that
          sparked a long-term interest in building reliable, scalable software.

experiences:
    title: Experience
    info:
      - role: Senior Software Engineer
        time: 2024 - Present
        company: Microsoft · Atlanta, GA
        details: |
          Building and operating services that run at Microsoft scale, partnering
          with product, design, and partner engineering teams to deliver features
          that are secure, observable, and reliable by default.

            - Design and implement backend services and APIs with a focus on
              performance, reliability, and long-term maintainability.
            - Drive engineering fundamentals — code quality, test coverage,
              telemetry, and on-call excellence — across squad deliverables.
            - Collaborate across disciplines to turn ambiguous requirements into
              shipped, measurable customer value.
            - Contribute to Microsoft's culture of giving through the annual
              Microsoft Give Campaign.

      - role: Senior Software Engineer
        time: 2018 - 2024
        company: Oracle · Atlanta, GA
        details: |
          Spent six years shipping enterprise-grade software within Oracle's
          health and cloud engineering organization, growing from senior
          individual contributor into a trusted technical lead across multiple
          product areas.

            - Delivered end-to-end features across the stack — from data model
              and service layer through to client integrations — for mission-critical
              healthcare workflows.
            - Led technical design discussions, RFC reviews, and production
              readiness reviews; mentored engineers on secure coding and
              operational best practices.
            - Partnered with SRE and platform teams to improve service
              reliability, reduce on-call toil, and tighten incident response.
            - Actively mentored developers in the Cerner Developer Center
              community (ongoing since 2018).

      - role: Lead Software Engineer
        time: 2018
        company: Capgemini · United States
        details: |
          Led a feature pod delivering enterprise application work for a Fortune
          client, balancing hands-on development with technical guidance.

            - Owned design and delivery of key modules, from requirements
              through production handoff.
            - Coached engineers on coding standards, debugging, and release
              discipline; unblocked team members on complex technical issues.

