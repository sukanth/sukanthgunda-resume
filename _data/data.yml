experiences:
    title: Experience
    info:
      - role: Senior Software Engineer
        time: 2024 - Present
        company: Microsoft · Atlanta, GA
        details: |
          Building **agentic AI developer tooling** in the Secure Future Initiative
          (SFI) space — Copilot skills, orchestrator agents, and Model Context
          Protocol (MCP) servers that help thousands of engineers across Microsoft
          turn compliance work into guided, high-signal AI workflows.

            - Designed and shipped LLM-powered skills and orchestrator agents that
              diagnose and remediate security &amp; compliance violations (SFI/QEI)
              across authentication, networking, storage, and identity controls —
              shifting remediation from manual toil to guided AI pair-programming.
            - Built MCP servers and Copilot extensions that ground agents in
              real engineering context — source repos, deployment systems,
              compliance KPIs, and troubleshooting guides — for accurate,
              auditable automation.
            - Applied **prompt engineering, retrieval-augmented generation (RAG),
              and structured tool use** patterns to deliver reliable, repeatable
              outcomes; added execution-signal capture to close the feedback loop
              and continuously improve skill quality.
            - Partnered with security, platform, and DevEx orgs to reduce
              time-to-approve on deployment requests and accelerate adoption of
              SFI standards through evidence-backed review briefs and
              auto-approval pathways.
            - Drive engineering fundamentals — code quality, test coverage,
              telemetry, and on-call excellence — while mentoring peers on
              building effective agentic systems.
            - Contributor to Microsoft's culture of giving through the annual
              Microsoft Give Campaign.

      - role: Senior Software Engineer
        time: 2018 - 2024
        company: Oracle · Atlanta, GA
        details: |
          Spent six years shipping enterprise-grade software within Oracle's
          health and cloud engineering organization, growing from senior
          individual contributor into a trusted technical lead across multiple
          product areas.

            - Delivered end-to-end features across the stack — from data model
              and service layer through to client integrations — for mission-critical
              healthcare workflows.
            - Led technical design discussions, RFC reviews, and production
              readiness reviews; mentored engineers on secure coding and
              operational best practices.
            - Partnered with SRE and platform teams to improve service
              reliability, reduce on-call toil, and tighten incident response.
            - Actively mentored developers in the Cerner Developer Center
              community (ongoing since 2018).

      - role: Lead Software Engineer
        time: 2018
        company: Capgemini · United States
        details: |
          Led a feature pod delivering enterprise application work for a Fortune
          client, balancing hands-on development with technical guidance.

            - Owned design and delivery of key modules, from requirements
              through production handoff.
            - Coached engineers on coding standards, debugging, and release
              discipline; unblocked team members on complex technical issues.

